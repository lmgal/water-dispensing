<tr id="resident-{{ r.id }}" class="editing-row">
  <td><code>{{ r.philsys_id }}</code></td>
  <td colspan="4">
    <form hx-put="/admin/residents/{{ r.id }}"
          hx-target="#resident-{{ r.id }}"
          hx-swap="outerHTML"
          class="inline-form">
      <div class="inline-fields">
        <input type="text" name="first_name" value="{{ r.first_name }}" class="input input-sm" placeholder="First name">
        <input type="text" name="last_name" value="{{ r.last_name }}" class="input input-sm" placeholder="Last name">
        <input type="text" name="address" value="{{ r.address or '' }}" class="input input-sm" placeholder="Address">
        <input type="number" name="daily_limit_ml" value="{{ r.daily_limit_ml }}" class="input input-sm input-narrow" placeholder="Limit mL">
      </div>
      <div class="inline-actions">
        <button type="submit" class="btn btn-sm btn-primary">Save</button>
        <button type="button" class="btn btn-sm btn-secondary"
                hx-get="/admin/residents/search?q="
                hx-target="#resident-tbody">Cancel</button>
      </div>
    </form>
  </td>
  <td></td>
</tr>
