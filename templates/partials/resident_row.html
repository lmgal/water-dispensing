<tr id="resident-{{ r.id }}">
  <td>
    <span x-data="{ show: false }" style="display:inline-flex;align-items:center;gap:4px;">
      <code x-text="show ? '{{ r.philsys_id }}' : '{{ '•' * (r.philsys_id | length) }}'"></code>
      <button type="button" @click="show = !show"
              style="all:unset;cursor:pointer;color:#aaa;display:inline-flex;align-items:center;"
              onmouseover="this.style.color='#333'" onmouseout="this.style.color='#aaa'">
        <svg x-show="!show" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg x-show="show" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </span>
  </td>
  <td>{{ r.full_name }}</td>
  <td>{{ r.address or "—" }}</td>
  <td>{{ "%.0f"|format(r.daily_limit_ml / 1000) }}L</td>
  <td class="actions">
    <button class="btn btn-sm btn-secondary"
            hx-get="/admin/residents/{{ r.id }}/edit"
            hx-target="#resident-{{ r.id }}"
            hx-swap="outerHTML">Edit</button>
    <button class="btn btn-sm btn-danger"
            hx-delete="/admin/residents/{{ r.id }}"
            hx-target="#resident-{{ r.id }}"
            hx-swap="delete"
            hx-confirm="Permanently delete {{ r.full_name }}? This cannot be undone.">Delete</button>
  </td>
</tr>
